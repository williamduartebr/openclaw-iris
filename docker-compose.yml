services:
  openclaw:
    build: .
    container_name: openclaw
    env_file:
      - ./.env.openclaw
    network_mode: host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    tty: true
    stdin_open: true
    restart: unless-stopped
    volumes:
      # Keep OpenClaw state inside this project so the setup is portable.
      - ./openclaw-root:/root/.openclaw
